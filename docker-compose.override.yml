# Local development overrides — applied automatically by docker compose.
# Differences from the production compose file:
#   - traefik-public is a plain local bridge (no Traefik required)
#   - All services expose ports to localhost for direct access
#   - API_URL points to localhost so the UI also works from the host

services:

  db:
    ports:
      - "5432:5432"

  api:
    ports:
      - "8000:8000"

  ui:
    ports:
      - "8501:8501"
    environment:
      API_URL: http://localhost:8000

  jupyter:
    ports:
      - "8888:8888"

networks:
  traefik-public:
    external: false
